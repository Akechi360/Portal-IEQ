version: '3.8'

services:
  freeradius:
    image: freeradius/freeradius-server:latest
    container_name: freeradius-ieq
    restart: always
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        # Detect config dir (Alpine=/etc/raddb, Debian=/etc/freeradius)
        if [ -d /etc/raddb ]; then CONF=/etc/raddb; else CONF=/etc/freeradius; fi

        cat > $$CONF/clients.conf << 'CLIENTS_EOF'
        client gateway_reyee {
            ipaddr = 0.0.0.0/0
            secret = Rgeg1510xs*2026*
            require_message_authenticator = no
        }
        CLIENTS_EOF

        cat > $$CONF/mods-available/rest << 'REST_EOF'
        rest {
            connect_uri = "http://portal.clinicaieq.com/api/radius/verify"

            authenticate {
                uri = "$${..connect_uri}"
                method = "post"
                body = "json"
                data = '{"username": "%{User-Name}", "password": "%{User-Password}"}'
            }

            authorize {
                uri = "$${..connect_uri}"
                method = "post"
                body = "json"
                data = '{"username": "%{User-Name}", "password": "%{User-Password}"}'
            }

            accounting {
                uri = "http://portal.clinicaieq.com/api/radius/acct"
                method = "post"
                body = "json"
                data = '{"status_type": "%{Acct-Status-Type}", "username": "%{User-Name}", "mac": "%{Calling-Station-Id}", "ip": "%{Framed-IP-Address}", "nas_port": "%{Called-Station-Id}", "session_id": "%{Acct-Session-Id}", "session_time": "%{Acct-Session-Time}", "input_octets": "%{Acct-Input-Octets}", "output_octets": "%{Acct-Output-Octets}", "input_gigawords": "%{Acct-Input-Gigawords}", "output_gigawords": "%{Acct-Output-Gigawords}", "terminate_cause": "%{Acct-Terminate-Cause}"}'
            }
        }
        REST_EOF

        ln -sf $$CONF/mods-available/rest $$CONF/mods-enabled/rest

        cat > $$CONF/sites-available/default << 'SITES_EOF'
        server default {
            listen {
                type = auth
                ipaddr = *
                port = 0
            }
            listen {
                type = acct
                ipaddr = *
                port = 0
            }

            authorize {
                rest
                if (ok) {
                    update control {
                        Auth-Type := rest
                    }
                }
            }

            authenticate {
                Auth-Type rest {
                    rest
                }
            }

            preacct {
                ok
            }

            accounting {
                rest
            }
        }
        SITES_EOF

        ln -sf $$CONF/sites-available/default $$CONF/sites-enabled/default

        # Find the correct binary
        if [ -x /usr/sbin/radiusd ]; then
          exec /usr/sbin/radiusd -X
        elif [ -x /usr/sbin/freeradius ]; then
          exec /usr/sbin/freeradius -X
        else
          echo "ERROR: No radiusd or freeradius binary found"
          ls -la /usr/sbin/
          exit 1
        fi
