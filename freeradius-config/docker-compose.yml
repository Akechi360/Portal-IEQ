version: '3.8'

services:
  freeradius:
    image: freeradius/freeradius-server:latest
    container_name: freeradius-ieq
    restart: always
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    volumes:
      - ./clients.conf:/etc/raddb/clients.conf:ro
      - ./mods-available-rest:/etc/raddb/mods-available/rest:ro
      - ./mods-available-rest:/etc/raddb/mods-enabled/rest:ro
      - ./sites-available-default:/etc/raddb/sites-available/default:ro
      - ./sites-available-default:/etc/raddb/sites-enabled/default:ro
